<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#030712">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<style>
:root{--bg:#030712;--sf:#111827;--bd:#1f2937;--bd2:#374151;--tx:#fff;--mu:#9ca3af;--dm:#6b7280;--ac:#2563eb;--ah:#3b82f6;--gn:#4ade80;--purple:#7c3aed}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center}
.spinner{display:flex;justify-content:center;padding:32px}
.spinner::after{content:'';width:32px;height:32px;border:4px solid var(--ac);border-top-color:transparent;border-radius:50%;animation:sp .6s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}

/* Login */
.login{text-align:center;padding:32px}
.login h1{font-size:28px;font-weight:800;margin-bottom:8px}
.login p{color:var(--mu);font-size:14px;margin-bottom:24px}
.login button{background:var(--ac);color:#fff;border:none;padding:12px 24px;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;transition:.15s}
.login button:hover{background:var(--ah)}

/* Home */
.home{text-align:center;padding:24px;width:100%;max-width:600px}
.home-header{margin-bottom:32px}
.home-header h1{font-size:24px;font-weight:800;margin-bottom:4px}
.home-header p{color:var(--mu);font-size:13px}
.user-bar{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:32px;color:var(--mu);font-size:13px}
.user-bar img{width:28px;height:28px;border-radius:50%;border:2px solid var(--bd2)}
.user-bar button{background:none;border:1px solid var(--bd2);color:var(--mu);padding:4px 12px;border-radius:6px;font-size:12px;cursor:pointer}
.user-bar button:hover{color:#fff;border-color:var(--dm)}

.apps{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.app-card{background:var(--sf);border:1px solid var(--bd);border-radius:16px;padding:32px 24px;cursor:pointer;transition:all .2s;text-decoration:none;color:var(--tx);display:flex;flex-direction:column;align-items:center;gap:12px}
.app-card:hover{border-color:var(--bd2);transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,.4)}
.app-card.fin:hover{border-color:var(--ac)}
.app-card.cp:hover{border-color:var(--purple)}
.app-icon{font-size:40px}
.app-name{font-size:17px;font-weight:700}
.app-desc{font-size:12px;color:var(--dm);line-height:1.4}
.app-card.fin .app-name{color:var(--ah)}
.app-card.cp .app-name{color:#c4b5fd}

@media(max-width:480px){
  .apps{grid-template-columns:1fr}
  .app-card{padding:24px 20px}
}
</style>
</head>
<body>
<div id="app"></div>
<script>
firebase.initializeApp({
  apiKey:"AIzaSyANZSNqtRITmJ7LATTgiQNzKYCbYFQliFw",
  authDomain:"finances-b28ec.firebaseapp.com",
  projectId:"finances-b28ec",
  storageBucket:"finances-b28ec.firebasestorage.app",
  messagingSenderId:"602987379825",
  appId:"1:602987379825:web:81389a0261143eaf166fd0"
});
const auth=firebase.auth();

let user=null, loading=true;

function render(){
  const app=document.getElementById('app');
  if(loading){app.innerHTML='<div class="spinner"></div>';return}
  if(!user){
    app.innerHTML=`
      <div class="login">
        <h1>Bruxaria Moderna</h1>
        <p>Acesse seus aplicativos com sua conta Google.</p>
        <button onclick="doLogin()">🔐 Entrar com Google</button>
      </div>`;
    return;
  }
  app.innerHTML=`
    <div class="home">
      <div class="home-header">
        <h1>Bruxaria Moderna</h1>
        <p>Escolha um aplicativo</p>
      </div>
      <div class="user-bar">
        <img src="${user.photoURL||''}" alt="">
        <span>${user.displayName||user.email}</span>
        <button onclick="doLogout()">Sair</button>
      </div>
      <div class="apps">
        <a href="financeiro.html" class="app-card fin">
          <div class="app-icon">💰</div>
          <div class="app-name">Financeiro</div>
          <div class="app-desc">Controle financeiro em tempo real</div>
        </a>
        <a href="circulo.html" class="app-card cp">
          <div class="app-icon">✦</div>
          <div class="app-name">Círculo de Proteção</div>
          <div class="app-desc">Gestão de assinantes · Bruxas do Sul</div>
        </a>
      </div>
    </div>`;
}

async function doLogin(){
  try{
    await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
  }catch(e){alert(e.message)}
}
function doLogout(){auth.signOut()}

auth.onAuthStateChanged(u=>{user=u;loading=false;render()});
</script>
</body>
</html>
